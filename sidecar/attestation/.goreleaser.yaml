---
version: 2
project_name: attestation-sidecar

env:
  - GO111MODULE=on

builds:
  - id: attestation-sidecar-linux-amd64
    binary: attestation-sidecar
    main: .
    goarch:
      - amd64
    goos:
      - linux
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w

dockers:
  - dockerfile: Dockerfile
    ids:
      - attestation-sidecar-linux-amd64
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.title=attestation-sidecar
      - --label=org.opencontainers.image.description=TEE attestation sidecar for confidential compute (AMD SEV-SNP + NVIDIA GPU CC)
      - --label=org.opencontainers.image.url={{.GitURL}}
      - --label=org.opencontainers.image.source={{.GitURL}}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.created={{ time "2006-01-02T15:04:05Z07:00" }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
    image_templates:
      - "ghcr.io/cloud-j-luna/attestation-sidecar:{{ .Version }}"
      - "ghcr.io/cloud-j-luna/attestation-sidecar:latest"

release:
  github:
    owner: cloud-j-luna
    name: attestation-sidecar
