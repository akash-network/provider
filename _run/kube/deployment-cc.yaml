---
version: "2.1"

services:
  web:
    image: nginx
    expose:
      - port: 80
        as: 80
        accept:
          - hello.localhost
        to:
          - global: true

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 0.1
        memory:
          size: 64Mi
        storage:
          size: 128Mi
  placement:
    westcoast:
      attributes:
        region: us-west
        confidential-compute: "true"
        confidential-compute-tee: amd-sev-snp
      pricing:
        web:
          denom: uact
          amount: 1000

deployment:
  web:
    westcoast:
      profile: web
      count: 1
